name: Sync Jobs from Feishu

on:
  schedule:
    # 每天凌晨 3:00 UTC+8 运行 (即前一天 19:00 UTC)
    - cron: '0 19 * * *'
  workflow_dispatch:
    # 允许手动触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync data from Feishu
        env:
          FEISHU_PERSONAL_ACCESS_TOKEN: ${{ secrets.FEISHU_PERSONAL_ACCESS_TOKEN }}
          FEISHU_APP_TOKEN: ${{ secrets.FEISHU_APP_TOKEN || 'YRafbYwZdamWrbs3Tf1cfzCjngh' }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID || 'tblwTldArcyMpOOP' }}
        run: node scripts/github-sync.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet src/data/jobs.json; then
            echo "📦 数据无变化，无需提交"
            exit 0
          fi
          
          git add src/data/jobs.json
          git commit -m "chore: auto-sync jobs from Feishu ($(date +%Y-%m-%d))"
          git push
          echo "🚀 已推送更新，Vercel 将自动部署"
