name: Sync Jobs from Feishu

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync data from Feishu
        env:
          FEISHU_APP_ID: cli_a9341dad31dedcd4
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_APP_TOKEN: ${{ secrets.FEISHU_APP_TOKEN || 'YRafbYwZdamWrbs3Tf1cfzCjngh' }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID || 'tblwTldArcyMpOOP' }}
        run: node scripts/sync-jobs.js

      - name: Commit and push if changed
        run: |
          set -x
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet src/data/jobs.json; then
            echo "📦 数据无变化，无需提交"
            exit 0
          fi
          
          echo "📝 检测到数据变化，准备提交..."
          git add src/data/jobs.json
          git status
          git commit -m "chore: auto-sync jobs from Feishu ($(date +%Y-%m-%d))"
          
          echo "🔄 拉取最新远程分支..."
          git pull origin main --rebase || {
            echo "❌ 拉取远程更新失败"
            exit 1
          }
          
          echo "🚀 推送到 main 分支..."
          git push
          echo "✅ 已推送更新，Vercel 将自动部署"    
